name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check for leaked secrets
        run: |
          # Fail if any file contains something that looks like an API key
          # Patterns: sk-ant-, sk-proj-, sk-, key-, ghp_, ghu_
          if git diff --name-only origin/main...HEAD 2>/dev/null | grep -v '^\.github/workflows/ci\.yml$' | xargs grep -rlP '(sk-ant-|sk-proj-|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[A-Z0-9]{16})' -- 2>/dev/null; then
            echo "::error::Possible API key detected in committed files. Remove it before pushing."
            exit 1
          fi

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        run: poetry run pytest tests/unit -m unit -v --tb=short

      - name: Run integration tests
        run: poetry run pytest tests/integration -m integration -v --tb=short

      - name: Run full test suite
        run: poetry run pytest tests/ -v --tb=short
